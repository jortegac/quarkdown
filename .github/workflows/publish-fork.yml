# Fork-only publish workflow.
#
# Runs only on the jortegac fork, by manual dispatch, to push the JVM modules
# and the install-lib zip to this fork's GitHub Packages registry
# (https://maven.pkg.github.com/jortegac/quarkdown).
#
# This file is intentionally not included in the upstream PR branch
# (feat/publish-github-packages). Keep it on `publish-fork` only.

name: Publish to fork's GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version.txt for this run (leave empty to use the committed value)"
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Override version
        if: ${{ inputs.version != '' }}
        run: printf "%s" "${{ inputs.version }}" > version.txt

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --no-daemon
