# Fork-only publish workflow.
#
# Runs only on the jortegac fork, by manual dispatch, to push the JVM modules
# and the install-lib zip to the fork's gh-pages branch. GitHub Pages serves
# that branch as a public, anonymous Maven repository at
# https://jortegac.github.io/quarkdown/, which lets downstream consumers
# (e.g. quarkdown-viewer on Railway) resolve Quarkdown JARs without storing
# a GitHub credential.
#
# We deliberately do NOT publish to GitHub Packages here: GH Packages rejects
# overwrites of existing Maven artifact versions with HTTP 409, and we want
# the new builds (which now bundle LICENSE files in META-INF) to be the
# canonical distribution channel. The previously-published GH Packages
# artifacts can be removed manually from the registry if/when convenient.
#
# This file is intentionally not included in the upstream PR branch
# (feat/publish-github-packages). Keep it on `publish-fork` only.

name: Publish to fork's gh-pages Maven repo

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version.txt for this run (leave empty to use the committed value)"
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Override version
        if: ${{ inputs.version != '' }}
        run: printf "%s" "${{ inputs.version }}" > version.txt

      - name: Publish to local GhPages Maven repo
        run: ./gradlew publishAllPublicationsToGhPagesRepository --no-daemon

      - name: Deploy Maven repo to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/gh-pages-maven-repo
          publish_branch: gh-pages
          # Retain previously published versions on each run so e.g. 2.0.1 and
          # 2.0.2 can coexist under the same /com/quarkdown/<artifact>/ tree.
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore(gh-pages): publish Maven artifacts for ${{ github.sha }}'
